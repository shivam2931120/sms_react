{% extends "base.html" %}

{% block public_content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <div
                class="bg-primary bg-opacity-10 text-primary d-inline-flex align-items-center justify-content-center rounded-3 p-3 mb-3">
                <i class="bi bi-building-fill fs-2"></i>
            </div>
            <h4 class="fw-bold">Welcome Back</h4>
            <p class="text-muted">Sign in to School Management System</p>
        </div>

        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-body p-4 p-sm-5">
                <form method="POST" action="">
                    <div class="mb-4">
                        <label for="email" class="form-label text-uppercase small fw-bold text-secondary">Username /
                            Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i
                                    class="bi bi-person"></i></span>
                            <input type="text" class="form-control bg-light border-start-0 ps-0" id="email" name="email"
                                placeholder="Enter your ID" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password"
                            class="form-label text-uppercase small fw-bold text-secondary">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i
                                    class="bi bi-lock"></i></span>
                            <input type="password" class="form-control bg-light border-start-0 ps-0" id="password"
                                name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label small text-muted" for="remember">Remember me</label>
                        </div>
                        <a href="#" class="small text-decoration-none fw-bold">Forgot password?</a>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary py-2 fw-bold">Sign In</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="text-center mt-4 text-muted small">
            &copy; 2024 School Management System. All rights reserved.
        </div>
    </div>
</div>
{% endblock %}
