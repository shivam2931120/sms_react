{% extends "base.html" %}

{% block public_content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center rounded-3 p-3 mb-3"
                style="background: rgba(225, 6, 0, 0.12);">
                <i class="bi bi-key-fill fs-1" style="color: #E10600;"></i>
            </div>
            <h4 class="fw-bold" style="color: #FFFFFF;">Forgot Password</h4>
            <p style="color: #B0B8C4;">Enter your email or username to reset</p>
        </div>

        <div class="card" style="background: #121821; border: 1px solid rgba(255,255,255,0.06);">
            <div class="card-body p-4 p-sm-5">
                <form method="POST" id="forgotForm">
                    <div class="mb-4">
                        <label for="email" class="form-label"
                            style="color: #B0B8C4; font-size: 0.8rem; text-transform: uppercase;">Email or
                            Username</label>
                        <div class="input-group">
                            <span class="input-group-text"
                                style="background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); color: #B0B8C4;"><i
                                    class="bi bi-envelope"></i></span>
                            <input type="text" class="form-control" id="email" name="email"
                                placeholder="Enter your email or username" required
                                style="background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); color: #FFFFFF;">
                        </div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary py-2 fw-bold btn-lg" id="submitBtn">
                            <i class="bi bi-send me-2"></i> Send Reset Link
                        </button>
                    </div>

                    <div class="text-center">
                        <a href="{{ url_for('auth.login') }}" style="color: #E10600;"><i
                                class="bi bi-arrow-left me-1"></i> Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('forgotForm').addEventListener('submit', function () {
        document.getElementById('submitBtn').classList.add('btn-loading');
    });
</script>
{% endblock %}
