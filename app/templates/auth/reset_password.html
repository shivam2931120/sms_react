{% extends "base.html" %}

{% block public_content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center rounded-3 p-3 mb-3"
                style="background: rgba(225, 6, 0, 0.12);">
                <i class="bi bi-shield-lock-fill fs-1" style="color: #E10600;"></i>
            </div>
            <h4 class="fw-bold" style="color: #FFFFFF;">Reset Password</h4>
            <p style="color: #B0B8C4;">Create a new password for your account</p>
        </div>

        <div class="card" style="background: #121821; border: 1px solid rgba(255,255,255,0.06);">
            <div class="card-body p-4 p-sm-5">
                <form method="POST" id="resetForm">
                    <div class="mb-4">
                        <label for="password" class="form-label"
                            style="color: #B0B8C4; font-size: 0.8rem; text-transform: uppercase;">New Password</label>
                        <div class="input-group">
                            <span class="input-group-text"
                                style="background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); color: #B0B8C4;"><i
                                    class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password"
                                placeholder="Min 6 characters" required minlength="6"
                                style="background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); color: #FFFFFF;">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="confirm_password" class="form-label"
                            style="color: #B0B8C4; font-size: 0.8rem; text-transform: uppercase;">Confirm
                            Password</label>
                        <div class="input-group">
                            <span class="input-group-text"
                                style="background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); color: #B0B8C4;"><i
                                    class="bi bi-lock-fill"></i></span>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                                placeholder="Repeat password" required
                                style="background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); color: #FFFFFF;">
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary py-2 fw-bold btn-lg" id="submitBtn">
                            <i class="bi bi-check-lg me-2"></i> Reset Password
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('resetForm').addEventListener('submit', function (e) {
        var pwd = document.getElementById('password').value;
        var confirm = document.getElementById('confirm_password').value;

        if (pwd !== confirm) {
            e.preventDefault();
            alert('Passwords do not match!');
            return;
        }

        document.getElementById('submitBtn').classList.add('btn-loading');
    });
</script>
{% endblock %}
