{% extends "student/base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="h4 mb-1"><i class="bi bi-calendar-week" style="color: #E10600;"></i> My Timetable</h2>
        <p class="mb-0" style="color: #B0B8C4;">Weekly class schedule</p>
    </div>
</div>

<div class="card">
    <div class="card-body p-3 p-md-4">
        <div id="timetableCalendar"></div>
    </div>
</div>

<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>

<style>
    /* FullCalendar BLACK + RED Theme */
    #timetableCalendar {
        max-width: 100%;
        margin: 0 auto;
    }

    .fc {
        --fc-border-color: rgba(255, 255, 255, 0.08);
        --fc-button-bg-color: #E10600;
        --fc-button-border-color: #E10600;
        --fc-button-hover-bg-color: #FF1A1A;
        --fc-button-hover-border-color: #FF1A1A;
        --fc-button-active-bg-color: #B00020;
        --fc-button-active-border-color: #B00020;
        --fc-today-bg-color: rgba(225, 6, 0, 0.1);
        --fc-event-bg-color: #E10600;
        --fc-event-border-color: #E10600;
        --fc-page-bg-color: transparent;
        --fc-neutral-bg-color: rgba(255, 255, 255, 0.03);
    }

    .fc .fc-toolbar-title {
        color: #FFFFFF !important;
        font-weight: 700;
        font-size: 1.25rem;
    }

    .fc .fc-button {
        font-weight: 600;
        text-transform: capitalize;
        padding: 0.4rem 0.8rem;
        border-radius: 6px !important;
    }

    .fc .fc-col-header-cell {
        background: rgba(255, 255, 255, 0.03);
        border-color: rgba(255, 255, 255, 0.08);
        padding: 0.5rem 0;
    }

    .fc .fc-col-header-cell-cushion {
        color: #B0B8C4;
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
    }

    .fc .fc-timegrid-slot-label-cushion {
        color: #9CA3AF;
        font-size: 0.75rem;
    }

    .fc .fc-timegrid-slot {
        border-color: rgba(255, 255, 255, 0.04);
        height: 3rem;
    }

    .fc .fc-event {
        border-radius: 4px;
        padding: 2px 4px;
        font-size: 0.75rem;
        font-weight: 500;
    }

    .fc .fc-event-title {
        font-weight: 600;
    }

    .fc .fc-timegrid-now-indicator-line {
        border-color: #E10600;
    }

    .fc .fc-timegrid-now-indicator-arrow {
        border-color: #E10600;
        border-top-color: transparent;
        border-bottom-color: transparent;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        var calendarEl = document.getElementById('timetableCalendar');

        // Convert timetable data to FullCalendar events
        var events = [];
        {% for day, classes in days.items() %}
        {% for cls in classes %}
        events.push({
            title: '{{ cls.subject.name if cls.subject else "Class" }}',
            daysOfWeek: [getDayNumber('{{ day }}')],
            startTime: '{{ cls.start_time.strftime("%H:%M") if cls.start_time else "09:00" }}',
            endTime: '{{ cls.end_time.strftime("%H:%M") if cls.end_time else "10:00" }}',
            extendedProps: {
                teacher: '{{ cls.teacher.first_name if cls.teacher else "" }} {{ cls.teacher.last_name if cls.teacher else "" }}'
            }
        });
        {% endfor %}
        {% endfor %}

        function getDayNumber(day) {
            var days = { 'Sunday': 0, 'Monday': 1, 'Tuesday': 2, 'Wednesday': 3, 'Thursday': 4, 'Friday': 5, 'Saturday': 6 };
            return days[day] || 0;
        }

        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'timeGridWeek,timeGridDay,listWeek'
            },
            slotMinTime: '08:00:00',
            slotMaxTime: '18:00:00',
            allDaySlot: false,
            weekends: false,
            nowIndicator: true,
            height: 'auto',
            events: events,
            eventDidMount: function (info) {
                info.el.title = info.event.title + ' - ' + info.event.extendedProps.teacher;
            }
        });

        calendar.render();
    });
</script>
{% endblock %}
